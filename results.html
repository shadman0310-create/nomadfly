<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Flight Results</title>

<style>

body{
font-family:Arial;
background:#0b1b36;
color:white;
padding:40px;
}

.flightCard{
background:#1c2a44;
padding:20px;
border-radius:10px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.saveBtn{
background:#38bdf8;
color:black;
}

.homeBtn{
background:#38bdf8;
color:black;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
margin-bottom:20px;
}

.airlineLogo{
width:32px;
height:32px;
margin-right:10px;
}
</style>

</head>

<body>

<h1>Flight Results</h1>
<button class="homeBtn" onclick="goHome()">⬅ Back to Home</button>
<div style="margin-bottom:20px;">
Sort by:
<button onclick="sortFlights('cheap')">Cheapest</button>
<button onclick="sortFlights('fast')">Fastest</button>
<button onclick="sortFlights('best')">Best</button>
</div>
<div id="results"></div>
<script>

const API_KEY = "iHMy08j1HiFxJSbCdvEUJsrl6fp8zYRq"
const API_SECRET = "erBUAyAYLhxTLbCt"

async function getToken(){

const response = await fetch(
"https://test.api.amadeus.com/v1/security/oauth2/token",
{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:`grant_type=client_credentials&client_id=${API_KEY}&client_secret=${API_SECRET}`
})

const data = await response.json()
return data.access_token

}

async function searchFlights(from,to){

const token = await getToken()

const response = await fetch(
`https://test.api.amadeus.com/v2/shopping/flight-offers?originLocationCode=${from}&destinationLocationCode=${to}&departureDate=2026-04-01&adults=1`,
{
headers:{
Authorization:`Bearer ${token}`
}
})

const data = await response.json()
return data.data

}

let allFlights = []

async function loadFlights(){

const params = new URLSearchParams(window.location.search)

const fromText = params.get("from")
const toText = params.get("to")

const from = fromText.match(/\((.*?)\)/)[1]
const to = toText.match(/\((.*?)\)/)[1]

allFlights = await searchFlights(from,to)

renderFlights(allFlights)

}

loadFlights()

function goHome(){
window.location="index.html"
}

</script>
<div id="flightModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
align-items:center;
justify-content:center;
">

<div style="
background:#1c2a44;
padding:30px;
border-radius:12px;
max-width:600px;
width:90%;
">

<h2>Flight Details</h2>

<div id="modalContent"></div>

<br>

<button onclick="closeModal()">Close</button>

</div>
</div>
</body>
</html>
