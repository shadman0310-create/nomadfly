<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Flight Results</title>

<style>

body{
font-family:Arial;
background:#0b1b36;
color:white;
padding:40px;
}

.flightCard{
background:#1c2a44;
padding:20px;
border-radius:12px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.2s;
}

.flightCard:hover{
transform:scale(1.02);
background:#24355c;
}

.airlineBlock{
display:flex;
align-items:center;
gap:12px;
}

.airlineLogo{
width:36px;
height:36px;
}

.flightInfo{
font-size:14px;
opacity:0.9;
}

.price{
font-size:20px;
font-weight:bold;
}

.detailsBtn{
background:#38bdf8;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

.homeBtn{
background:#38bdf8;
color:black;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
margin-bottom:20px;
}

.sortBtn{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:6px;
}

</style>
</head>

<body>

<h1>Flight Results</h1>

<button class="homeBtn" onclick="goHome()">⬅ Back</button>

<div style="margin-bottom:20px;">
Sort by:
<button class="sortBtn" onclick="sortFlights('cheap')">Cheapest</button>
<button class="sortBtn" onclick="sortFlights('fast')">Fastest</button>
<button class="sortBtn" onclick="sortFlights('best')">Best</button>
</div>

<div id="results"></div>

<script>

const API_KEY = "iHMy08j1HiFxJSbCdvEUJsrl6fp8zYRq"
const API_SECRET = "erBUAyAYLhxTLbCt`"

let allFlights = []

async function getToken(){

const response = await fetch(
"https://test.api.amadeus.com/v1/security/oauth2/token",
{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:`grant_type=client_credentials&client_id=${API_KEY}&client_secret=${API_SECRET}`
})

const data = await response.json()
return data.access_token

}

async function searchFlights(from,to,date,token){

const response = await fetch(
`https://test.api.amadeus.com/v2/shopping/flight-offers?originLocationCode=${from}&destinationLocationCode=${to}&departureDate=${date}&adults=1`,
{
headers:{Authorization:`Bearer ${token}`}
})

const data = await response.json()
return data.data

}

async function loadFlights(){

const params = new URLSearchParams(window.location.search)

const fromText = params.get("from")
const toText = params.get("to")
const date = params.get("date")

if(!fromText || !toText || !date){

document.getElementById("results").innerHTML =
"Please search flights from the homepage."

return
}

const from = fromText.match(/\((.*?)\)/)[1]
const to = toText.match(/\((.*?)\)/)[1]

allFlights = []

const token = await getToken()

const baseDate = new Date(date)

for(let i=-1;i<=1;i++){

const newDate = new Date(baseDate)
newDate.setDate(baseDate.getDate()+i)

const formatted = newDate.toISOString().split("T")[0]

const flights = await searchFlights(from,to,formatted,token)

if(flights){
allFlights = allFlights.concat(flights)
}

}

if(!allFlights.length){

document.getElementById("results").innerHTML =
"No flights found."

return
}

renderFlights(allFlights)

}

function renderFlights(flights){

const results = document.getElementById("results")
results.innerHTML = ""

flights.forEach((flight,index)=>{

const segments = flight.itineraries[0].segments

const airline = segments[0].carrierCode

const logo =
`https://content.airhex.com/content/logos/airlines_${airline}_200_200_s.png`

const departure =
segments[0].departure.at.slice(11,16)

const arrival =
segments[segments.length-1].arrival.at.slice(11,16)

const stops = segments.length-1

const duration =
flight.itineraries[0].duration.replace("PT","")

const price = flight.price.total

results.innerHTML +=

`
<div class="flightCard">

<div class="airlineBlock">

<img class="airlineLogo" src="${logo}">

<div>

<b>${airline}</b>

<div class="flightInfo">

${departure} → ${arrival}<br>
Duration: ${duration}<br>
Stops: ${stops}

</div>

<button class="detailsBtn"
onclick="buyFlight('${segments[0].departure.iataCode}','${segments[segments.length-1].arrival.iataCode}','${segments[0].departure.at}')">

Buy ticket

</button>

</div>

</div>

<div class="price">
€${price}
</div>

</div>
`

})

}

function durationToMinutes(duration){

let h = duration.match(/(\d+)H/)
let m = duration.match(/(\d+)M/)

h = h ? parseInt(h[1]) : 0
m = m ? parseInt(m[1]) : 0

return h*60 + m

}

function sortFlights(type){

if(type==="cheap"){
allFlights.sort((a,b)=>parseFloat(a.price.total)-parseFloat(b.price.total))
}

if(type==="fast"){
allFlights.sort((a,b)=>durationToMinutes(a.itineraries[0].duration)-durationToMinutes(b.itineraries[0].duration))
}

if(type==="best"){
allFlights.sort((a,b)=>{
return (parseFloat(a.price.total)+a.itineraries[0].segments.length*30)
-
(parseFloat(b.price.total)+b.itineraries[0].segments.length*30)
})
}

renderFlights(allFlights)

}

function buyFlight(from,to,departureTime){

const date = new Date(departureTime)

const day = String(date.getDate()).padStart(2,'0')
const month = String(date.getMonth()+1).padStart(2,'0')

const search = `/search/${from}${to}${day}${month}`

window.open("https://www.aviasales.com"+search,"_blank")

}

function goHome(){
window.location="index.html"
}

loadFlights()

</script>

</body>
</html>
