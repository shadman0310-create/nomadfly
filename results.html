<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Flight Results</title>

<style>

body{
font-family:Arial;
background:#0b1b36;
color:white;
padding:40px;
}

.flightCard{
background:#1c2a44;
padding:20px;
border-radius:12px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.2s;
}

.flightCard:hover{
transform:scale(1.02);
background:#24355c;
}

.airlineBlock{
display:flex;
align-items:center;
gap:12px;
}

.airlineLogo{
width:36px;
height:36px;
}

.flightInfo{
font-size:14px;
opacity:0.9;
}

.price{
font-size:20px;
font-weight:bold;
}

.detailsBtn{
background:#38bdf8;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

.homeBtn{
background:#38bdf8;
color:black;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
margin-bottom:20px;
}

.sortBtn{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:6px;
}

#flightModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
align-items:center;
justify-content:center;
}

.modalBox{
background:#1c2a44;
padding:30px;
border-radius:12px;
max-width:600px;
width:90%;
}

</style>

</head>

<body>

<h1>Flight Results</h1>

<button class="homeBtn" onclick="goHome()">⬅ Back to Home</button>

<div style="margin-bottom:20px;">
Sort by:
<button class="sortBtn" onclick="sortFlights('cheap')">Cheapest</button>
<button class="sortBtn" onclick="sortFlights('fast')">Fastest</button>
<button class="sortBtn" onclick="sortFlights('best')">Best</button>
</div>

<div id="results"></div>

<div id="flightModal">
<div class="modalBox">

<h2>Flight Details</h2>

<div id="modalContent"></div>

<br>
<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

const API_KEY = "iHMy08j1HiFxJSbCdvEUJsrl6fp8zYRq"
const API_SECRET = "erBUAyAYLhxTLbCt"

let allFlights = []

async function getToken(){

const response = await fetch(
"https://test.api.amadeus.com/v1/security/oauth2/token",
{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:`grant_type=client_credentials&client_id=${API_KEY}&client_secret=${API_SECRET}`
})

const data = await response.json()
return data.access_token

}

async function searchFlights(from,to,date,token){
const response = await fetch(
`https://test.api.amadeus.com/v2/shopping/flight-offers?originLocationCode=${from}&destinationLocationCode=${to}&departureDate=${date}&adults=1`,
{
headers:{
Authorization:`Bearer ${token}`
}
})

const data = await response.json()
return data.data

}

async function loadFlights(){

const params = new URLSearchParams(window.location.search)

const fromText = params.get("from")
const toText = params.get("to")
const date = params.get("date")

if(!fromText || !toText){

document.getElementById("results").innerHTML =
"Please search flights from the home page."

return

}

const from = fromText.match(/\((.*?)\)/)[1]
const to = toText.match(/\((.*?)\)/)[1]

allFlights = []
const token = await getToken()
const baseDate = new Date(date)

for(let i=-3;i<=3;i++){

const newDate = new Date(baseDate)
newDate.setDate(baseDate.getDate()+i)

const formatted =
newDate.toISOString().split("T")[0]

const flights = await searchFlights(from,to,formatted,token)

if(flights){
allFlights = allFlights.concat(flights)
}

}

if(!allFlights || allFlights.length === 0){

document.getElementById("results").innerHTML =
"No flights found for this route."

return

}

renderFlights(allFlights)

}

function renderFlights(flights){

const results = document.getElementById("results")
results.innerHTML = ""

flights.forEach((flight,index)=>{

const itinerary = flight.itineraries[0]

const segments = itinerary.segments

const airline = segments[0].carrierCode

const logo =
`https://content.airhex.com/content/logos/airlines_${airline}_200_200_s.png`

const departure =
segments[0].departure.at.slice(11,16)

const arrival =
segments[segments.length-1].arrival.at.slice(11,16)

const stops = segments.length-1

const duration = itinerary.duration.replace("PT","")

const price = flight.price.total

results.innerHTML += `

<div class="flightCard">

<div class="airlineBlock">

<img class="airlineLogo" src="${logo}">

<div>

<b>${airline}</b>

<div class="flightInfo">

${departure} → ${arrival}

<br>

Duration: ${duration}

<br>

Stops: ${stops}

</div>

<button class="detailsBtn" onclick="showDetails(${index})">
Details
</button>

<button class="detailsBtn" onclick="buyFlight('${segments[0].departure.iataCode}','${segments[segments.length-1].arrival.iataCode}','${segments[0].departure.at}')">
Buy ticket
</button>

</div>

</div>

<div class="price">

€${price}

</div>

</div>

`

})

}

function showDetails(index){

const flight = allFlights[index]

const segments = flight.itineraries[0].segments

let html = ""

segments.forEach(seg=>{

html += `

<b>${seg.departure.iataCode}</b>
${seg.departure.at}

→

<b>${seg.arrival.iataCode}</b>
${seg.arrival.at}

<br>
Aircraft: ${seg.aircraft.code}

<br><br>

`

})

document.getElementById("modalContent").innerHTML = html

document.getElementById("flightModal").style.display="flex"

}

function closeModal(){

document.getElementById("flightModal").style.display="none"

}

function durationToMinutes(duration){

let h = duration.match(/(\d+)H/)
let m = duration.match(/(\d+)M/)

h = h ? parseInt(h[1]) : 0
m = m ? parseInt(m[1]) : 0

return h*60 + m

}

function sortFlights(type){

if(type==="cheap"){

allFlights.sort((a,b)=>
parseFloat(a.price.total) - parseFloat(b.price.total)
)

}

if(type==="fast"){

allFlights.sort((a,b)=>
durationToMinutes(a.itineraries[0].duration) -
durationToMinutes(b.itineraries[0].duration)
)

}

if(type==="best"){

allFlights.sort((a,b)=>{

const scoreA =
parseFloat(a.price.total) +
a.itineraries[0].segments.length*30

const scoreB =
parseFloat(b.price.total) +
b.itineraries[0].segments.length*30

return scoreA-scoreB

})

}

renderFlights(allFlights)

}

function goHome(){
window.location="index.html"
}

loadFlights()

function buyFlight(from,to,departureTime){

const affiliate = "https://aviasales.tpo.li/AV0q9qVL"

const date = new Date(departureTime)

const day = String(date.getDate()).padStart(2,'0')
const month = String(date.getMonth()+1).padStart(2,'0')

const search = `/search/${from}${to}${day}${month}1`

window.open(affiliate + search, "_blank", "noopener")

}
function getCheapestByDate(flights){

const prices = {}

flights.forEach(flight=>{

const date =
flight.itineraries[0].segments[0].departure.at.split("T")[0]

const price = parseFloat(flight.price.total)

if(!prices[date] || price < prices[date]){
prices[date] = price
}

})

return prices

}
</script>

</body>
</html>
