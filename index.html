<title>NomadFly</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAyAu8ofSXIgx4LAIGFVnMJL9-xnQIzpa4",
  authDomain: "nomadfly.firebaseapp.com",
  projectId: "nomadfly",
  storageBucket: "nomadfly.firebasestorage.app",
  messagingSenderId: "139421378249",
  appId: "1:139421378249:web:813b81d31b879a2e4a4f18",
  measurementId: "G-R1XD9Q665C"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const authBox = document.querySelector(".auth");

onAuthStateChanged(auth, async (user)=>{

if(user){

const userRef = doc(db,"users",user.uid)
const userSnap = await getDoc(userRef)

let username="User"

if(userSnap.exists()){
username=userSnap.data().username
}

authBox.innerHTML = `
<span style="margin-right:10px">👤 ${username}</span>
<button onclick="window.location='profile.html'">Profile</button>
<button onclick="logout()">Logout</button>
`

}else{

authBox.innerHTML = `
<button class="signin" onclick="signInWithGoogle()">Sign in</button>
<button class="signup" onclick="signInWithGoogle()">Sign up</button>
`

}

});

window.editProfile = async function(){

const user = auth.currentUser

const newUsername = prompt("Enter new username")

if(!newUsername) return

await setDoc(doc(db,"users",user.uid),{
username:newUsername
},{merge:true})

alert("Username updated")

location.reload()

}

window.logout = async function(){

await signOut(auth)

}

window.signInWithGoogle = async function(){

try{

const result = await signInWithPopup(auth, provider)
const user = result.user

const userRef = doc(db,"users",user.uid)
const userSnap = await getDoc(userRef)

if(!userSnap.exists()){

await setDoc(userRef,{
username: user.displayName || "Traveler",
email: user.email,
createdAt: new Date().toISOString()
})

}

}catch(error){

alert(error.message)

}

}

</script>

<body>

<nav>

<div class="logo">NomadFly ✈️</div>

<div class="auth">
<button class="signin" onclick="signInWithGoogle()">Sign in</button>
<button class="signup" onclick="signInWithGoogle()">Sign up</button>
</div>

</nav>

<div class="hero">

<h1>Find Cheap Flights</h1>

<div class="search-card">

<div style="margin-bottom:15px;text-align:left;font-size:14px;">
<label>
<input type="checkbox" id="tripToggle">
One way flight
</label>
</div>

<div class="row">

<div class="input-container">
<input id="from" placeholder="From">
<div id="fromResults" class="autocomplete"></div>
</div>

<button class="swap" onclick="swapAirports()">↔</button>

<div class="input-container">
<input id="to" placeholder="To">
<div id="toResults" class="autocomplete"></div>
</div>

</div>

<div class="row">

<input type="date" id="depart" min="">
<input type="date" id="returnDate">

</div>

<div class="passengers" onclick="togglePassengers()" id="passengerSummary">
1 Adult • Economy
</div>

<div id="passengerPanel" class="passenger-panel">

<div class="row">
<label>Adults (16+)</label>
<input type="number" id="adults" value="1" min="1" max="10" onchange="limitPassengers()">
</div>

<div class="row">
<label>Children (2-15)</label>
<input type="number" id="children" value="0" min="0" max="10" onchange="limitPassengers()">
</div>

<div class="row">
<label>Infants (0-2)</label>
<input type="number" id="infants" value="0" min="0" max="10" onchange="limitPassengers()">
</div>

<div class="row">
<label>Cabin class</label>

<select id="cabin">
<option>Economy</option>
<option>Premium Economy</option>
<option>Business</option>
<option>First</option>
</select>

</div>

</div>

<button class="search-btn" onclick="searchFlights()">
Search Flights
</button>
<div style="margin-top:20px">

<div class="flightCard">

<div>
<b>VNO → BCN</b>
<br>
💰 63€
</div>

<button onclick="saveFlight('VNO','BCN','63€')">
❤️ Save
</button>

</div>

</div>
</div>

</div>

<div class="bottom-nav">

<button>🔥 Hot Deals</button>
<button>🎲 Surprise Trips</button>
<button>💸 Budget Flights</button>

</div>

<script>

function togglePassengers(){

const panel=document.getElementById("passengerPanel")
panel.style.display=panel.style.display==="block"?"none":"block"

}



function updatePassengerSummary(){

let adults=document.getElementById("adults").value
let cabin=document.getElementById("cabin").value

let text=adults>1?`${adults} Adults`:`${adults} Adult`
text+=` • ${cabin}`

document.getElementById("passengerSummary").innerText=text

}

document.getElementById("adults").onchange=updatePassengerSummary
document.getElementById("cabin").onchange=updatePassengerSummary

const toggle=document.getElementById("tripToggle")
const returnDate=document.getElementById("returnDate")

toggle.addEventListener("change",()=>{

returnDate.style.display=toggle.checked?"none":"block"

})

let airports=[]

fetch("airports.json")
.then(res=>res.json())
.then(data=>{

airports=Object.values(data)

})

function searchAirports(query){

query=query.toLowerCase()

return airports
.filter(a=>

a.name &&
(
a.name.toLowerCase().includes(query) ||
a.city?.toLowerCase().includes(query) ||
a.country?.toLowerCase().includes(query) ||
a.iata?.toLowerCase().includes(query)
)

)
.slice(0,10)

}

function setupAutocomplete(inputId,resultsId){

const input=document.getElementById(inputId)
const resultsBox=document.getElementById(resultsId)

input.addEventListener("input",()=>{

const results=searchAirports(input.value)

resultsBox.innerHTML=""

results.forEach(a=>{

const div=document.createElement("div")

div.innerText=`${a.city} - ${a.name} (${a.iata})`

div.onclick=()=>{

input.value=`${a.city} (${a.iata})`
resultsBox.innerHTML=""

}

resultsBox.appendChild(div)

})

})

}

setupAutocomplete("from","fromResults")
setupAutocomplete("to","toResults")

function swapAirports(){

let from=document.getElementById("from")
let to=document.getElementById("to")

let temp=from.value
from.value=to.value
to.value=temp

}

async function saveFlight(from,to,price){

const user = auth.currentUser

if(!user){
alert("Login first to save flights")
return
}

await setDoc(doc(db,"users",user.uid,"savedFlights",Date.now().toString()),{

from:from,
to:to,
price:price

})

alert("Flight saved")

}
const departInput = document.getElementById("depart")
const returnInput = document.getElementById("returnDate")

departInput.addEventListener("change", () => {

const departDate = departInput.value

returnInput.min = departDate

if(returnInput.value < departDate){
returnInput.value = ""
}

})
const today = new Date().toISOString().split("T")[0]

document.getElementById("depart").min = today
document.getElementById("returnDate").min = today
function searchFlights(){

const from = document.getElementById("from").value
const to = document.getElementById("to").value
const date = document.getElementById("depart").value

if(!from || !to || !date){

alert("Please enter departure, destination and date")
return

}

window.location = `results.html?from=${from}&to=${to}&date=${date}`

}
function limitPassengers(){

const adults = Number(document.getElementById("adults").value)
const children = Number(document.getElementById("children").value)
const infants = Number(document.getElementById("infants").value)

const total = adults + children + infants

if(total > 10){

alert("Maximum 10 passengers per booking")

document.getElementById("children").value = 0
document.getElementById("infants").value = 0

}

}
</script>
