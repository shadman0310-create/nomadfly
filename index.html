<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>NomadFly</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#020617;
}

.logo{
font-size:22px;
font-weight:bold;
color:#38bdf8;
}

.auth button{
margin-left:10px;
padding:8px 16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.signin{
background:transparent;
color:white;
border:1px solid #38bdf8;
}

.signup{
background:#38bdf8;
color:black;
}

.hero{
text-align:center;
margin-top:120px;
}

.search-box{
margin-top:40px;
display:flex;
justify-content:center;
gap:10px;
}

.search-box input{
padding:12px;
border-radius:8px;
border:none;
width:220px;
}

.search-btn{
padding:12px 20px;
background:#38bdf8;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.autocomplete{
position:absolute;
background:#1e293b;
border-radius:8px;
width:220px;
max-height:200px;
overflow-y:auto;
margin-top:5px;
}

.autocomplete div{
padding:10px;
cursor:pointer;
}

.autocomplete div:hover{
background:#334155;
}

.input-container{
position:relative;
}

</style>

</head>

<body>

<nav>

<div class="logo">NomadFly</div>

<div class="auth">
<button class="signin">Sign in</button>
<button class="signup">Sign up</button>
</div>

</nav>

<div class="hero">

<h1>Find cheap flights anywhere</h1>

<div class="search-box">

<div class="input-container">
<input id="from" placeholder="From">
<div id="fromResults" class="autocomplete"></div>
</div>

<div class="input-container">
<input id="to" placeholder="Destination">
<div id="toResults" class="autocomplete"></div>
</div>

<button class="search-btn">Search</button>

</div>

</div>

<script>

let airports = []

fetch("airports.json")
.then(res => res.json())
.then(data => {

airports = Object.values(data)

console.log("airports loaded:", airports.length)

})

function searchAirports(query){

query = query.toLowerCase()

return airports
.filter(a =>
a.name &&
(
a.name.toLowerCase().includes(query) ||
a.city?.toLowerCase().includes(query) ||
a.country?.toLowerCase().includes(query) ||
a.iata?.toLowerCase().includes(query)
)
)
.slice(0,10)

}

function setupAutocomplete(inputId, resultsId){

const input = document.getElementById(inputId)
const resultsBox = document.getElementById(resultsId)

input.addEventListener("input", ()=>{

const results = searchAirports(input.value)

resultsBox.innerHTML = ""

results.forEach(a=>{

const div = document.createElement("div")

div.innerText = `${a.city} - ${a.name} (${a.iata})`

div.onclick = ()=>{

input.value = `${a.city} (${a.iata})`

resultsBox.innerHTML=""

}

resultsBox.appendChild(div)

})

})

}

setupAutocomplete("from","fromResults")
setupAutocomplete("to","toResults")

</script>

</body>

</html>
