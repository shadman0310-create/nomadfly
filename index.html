<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>NomadFly</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAyAu8ofSXIgx4LAIGFVnMJL9-xnQIzpa4",
  authDomain: "nomadfly.firebaseapp.com",
  projectId: "nomadfly",
  storageBucket: "nomadfly.firebasestorage.app",
  messagingSenderId: "139421378249",
  appId: "1:139421378249:web:813b81d31b879a2e4a4f18",
  measurementId: "G-R1XD9Q665C"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.signInWithGoogle = async function(){

  try{

    const result = await signInWithPopup(auth, provider)
    const user = result.user

    alert("Logged in as " + user.displayName)
    console.log(user)

  }catch(error){

    console.error(error)
    alert(error.message)

  }

}

</script>

<style>

body{
font-family:Arial;
background:#0b1b36;
color:white;
margin:0;
padding:0;
padding-bottom:80px;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#38bdf8;
}

.auth button{
margin-left:10px;
padding:8px 14px;
border-radius:6px;
border:none;
cursor:pointer;
}

.signin{
background:transparent;
border:1px solid #38bdf8;
color:#38bdf8;
}

.signup{
background:#38bdf8;
color:black;
}

.hero{
text-align:center;
margin-top:120px;
}

.hero h1{
font-size:36px;
margin-bottom:30px;
}

.search-card{
background:#1c2a44;
padding:30px;
border-radius:14px;
width:500px;
margin:auto;
}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

input{
padding:10px;
border-radius:6px;
border:none;
flex:1;
}

.swap{
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
width:40px;
}

.search-btn{
margin-top:15px;
width:100%;
padding:12px;
background:#38bdf8;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.passengers{
margin-top:10px;
padding:8px;
background:#111c30;
border-radius:6px;
cursor:pointer;
}

.passenger-panel{
display:none;
background:#111c30;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.passenger-panel .row{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.passenger-panel input,
.passenger-panel select{
padding:6px;
border-radius:6px;
border:none;
}

.input-container{
position:relative;
flex:1;
}

.autocomplete{
position:absolute;
background:#1e293b;
border-radius:8px;
width:100%;
max-height:200px;
overflow-y:auto;
margin-top:5px;
z-index:10;
}

.autocomplete div{
padding:10px;
cursor:pointer;
}

.autocomplete div:hover{
background:#334155;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:16px;
}

.bottom-nav button{
background:transparent;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

.bottom-nav button:hover{
color:#38bdf8;
}

</style>

</head>

<body>

<nav>

<div class="logo">NomadFly ✈️</div>

<div class="auth">
<button class="signin" onclick="signInWithGoogle()">Sign in</button>
<button class="signup" onclick="signInWithGoogle()">Sign up</button>
</div>

</nav>

<div class="hero">

<h1>Find Cheap Flights</h1>

<div class="search-card">

<div style="margin-bottom:15px;text-align:left;font-size:14px;">
<label>
<input type="checkbox" id="tripToggle">
One way flight
</label>
</div>

<div class="row">

<div class="input-container">
<input id="from" placeholder="From">
<div id="fromResults" class="autocomplete"></div>
</div>

<button class="swap" onclick="swapAirports()">↔</button>

<div class="input-container">
<input id="to" placeholder="To">
<div id="toResults" class="autocomplete"></div>
</div>

</div>

<div class="row">

<input type="date" id="depart">
<input type="date" id="returnDate">

</div>

<div class="passengers" onclick="togglePassengers()" id="passengerSummary">
1 Adult • Economy
</div>

<div id="passengerPanel" class="passenger-panel">

<div class="row">
<label>Adults (16+)</label>
<input type="number" id="adults" value="1" min="1">
</div>

<div class="row">
<label>Children (2-15)</label>
<input type="number" id="children" value="0">
</div>

<div class="row">
<label>Infants (0-2)</label>
<input type="number" id="infants" value="0">
</div>

<div class="row">
<label>Cabin class</label>

<select id="cabin">
<option>Economy</option>
<option>Premium Economy</option>
<option>Business</option>
<option>First</option>
</select>

</div>

</div>

<button class="search-btn">Search Flights</button>

</div>

</div>

<div class="bottom-nav">

<button>🔥 Hot Deals</button>
<button>🎲 Surprise Trips</button>
<button>💸 Budget Flights</button>

</div>

<script>

function togglePassengers(){

const panel=document.getElementById("passengerPanel")
panel.style.display=panel.style.display==="block"?"none":"block"

}

function updatePassengerSummary(){

let adults=document.getElementById("adults").value
let cabin=document.getElementById("cabin").value

let text=adults>1?`${adults} Adults`:`${adults} Adult`
text+=` • ${cabin}`

document.getElementById("passengerSummary").innerText=text

}

document.getElementById("adults").onchange=updatePassengerSummary
document.getElementById("cabin").onchange=updatePassengerSummary

const toggle=document.getElementById("tripToggle")
const returnDate=document.getElementById("returnDate")

toggle.addEventListener("change",()=>{

returnDate.style.display=toggle.checked?"none":"block"

})

let airports=[]

fetch("airports.json")
.then(res=>res.json())
.then(data=>{

airports=Object.values(data)

})

function searchAirports(query){

query=query.toLowerCase()

return airports
.filter(a=>

a.name &&
(
a.name.toLowerCase().includes(query) ||
a.city?.toLowerCase().includes(query) ||
a.country?.toLowerCase().includes(query) ||
a.iata?.toLowerCase().includes(query)
)

)
.slice(0,10)

}

function setupAutocomplete(inputId,resultsId){

const input=document.getElementById(inputId)
const resultsBox=document.getElementById(resultsId)

input.addEventListener("input",()=>{

const results=searchAirports(input.value)

resultsBox.innerHTML=""

results.forEach(a=>{

const div=document.createElement("div")

div.innerText=`${a.city} - ${a.name} (${a.iata})`

div.onclick=()=>{

input.value=`${a.city} (${a.iata})`
resultsBox.innerHTML=""

}

resultsBox.appendChild(div)

})

})

}

setupAutocomplete("from","fromResults")
setupAutocomplete("to","toResults")

function swapAirports(){

let from=document.getElementById("from")
let to=document.getElementById("to")

let temp=from.value
from.value=to.value
to.value=temp

}

</script>

</body>
</html>
