<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>NomadFly</title>

<style>

body{
font-family:Arial;
background:#0b1b36;
color:white;
margin:0;
padding:0;
padding-bottom:80px;
}

.passenger-panel{
display:none;
background:#111c30;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.passenger-panel .row{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.passenger-panel input,
.passenger-panel select{
padding:6px;
border-radius:6px;
border:none;
}

/* NAV */

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#38bdf8;
}

.auth button{
margin-left:10px;
padding:8px 14px;
border-radius:6px;
border:none;
cursor:pointer;
}

.signin{
background:transparent;
border:1px solid #38bdf8;
color:#38bdf8;
}

.signup{
background:#38bdf8;
color:black;
}

/* HERO */

.hero{
text-align:center;
margin-top:120px;
}

.hero h1{
font-size:36px;
margin-bottom:30px;
}

/* SEARCH CARD */

.search-card{
background:#1c2a44;
padding:30px;
border-radius:14px;
width:500px;
margin:auto;
}

/* TRIP TYPE */

.trip-type{
display:flex;
gap:10px;
margin-bottom:15px;
}

.trip-type button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#111c30;
color:white;
cursor:pointer;
}

.trip-active{
background:#38bdf8;
color:black;
}

/* ROWS */

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

/* INPUTS */

input{
padding:10px;
border-radius:6px;
border:none;
flex:1;
}

/* SWAP BUTTON */

.swap{
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
width:40px;
}

/* SEARCH BUTTON */

.search-btn{
margin-top:15px;
width:100%;
padding:12px;
background:#38bdf8;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

/* PASSENGERS */

.passengers{
margin-top:10px;
padding:8px;
background:#111c30;
border-radius:6px;
cursor:pointer;
}

/* AUTOCOMPLETE */

.input-container{
position:relative;
flex:1;
}

.autocomplete{
position:absolute;
background:#1e293b;
border-radius:8px;
width:100%;
max-height:200px;
overflow-y:auto;
margin-top:5px;
z-index:10;
}

.autocomplete div{
padding:10px;
cursor:pointer;
}

.autocomplete div:hover{
background:#334155;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:16px;
}

</style>

</head>

<body>

<nav>

<div class="logo">NomadFly ✈️</div>

<div class="auth">
<button class="signin">Sign in</button>
<button class="signup">Sign up</button>
</div>

</nav>

<div class="hero">

<h1>Find Cheap Flights</h1>

<div class="search-card">

<div class="trip-type">

<button id="roundBtn" class="trip-active">Round trip</button>
<button id="onewayBtn">One way</button>

</div>

<div class="row">

<div class="input-container">
<input id="from" placeholder="From">
<div id="fromResults" class="autocomplete"></div>
</div>

<button class="swap" onclick="swapAirports()">↔</button>

<div class="input-container">
<input id="to" placeholder="To">
<div id="toResults" class="autocomplete"></div>
</div>

</div>

<div class="row">

<input type="date" id="depart">

<input type="date" id="returnDate">

</div>

<div class="passengers" onclick="togglePassengers()">
Passengers & Cabin class
</div>

<div id="passengerPanel" class="passenger-panel">

<div class="row">
<label>Adults (16+)</label>
<input type="number" id="adults" value="1" min="1">
</div>

<div class="row">
<label>Children (2-15)</label>
<input type="number" id="children" value="0" min="0">
</div>

<div class="row">
<label>Infants (0-2)</label>
<input type="number" id="infants" value="0" min="0">
</div>

<div class="row">
<label>Cabin class</label>

<select id="cabin">
<option>Economy</option>
<option>Premium Economy</option>
<option>Business</option>
<option>First</option>
</select>

</div>

<button class="search-btn">Search Flights</button>

</div>

<div class="bottom-nav">
    
<div>🔥 Hot Deals</div>
<div>🎲 Surprise Trips</div>
<div>💸 Budget Flights</div>

</div>

<script>

function togglePassengers(){

const panel = document.getElementById("passengerPanel")

if(panel.style.display==="block"){
panel.style.display="none"
}else{
panel.style.display="block"
}

}

/* LOAD AIRPORTS */

let airports=[]

fetch("airports.json")
.then(res=>res.json())
.then(data=>{

airports=Object.values(data)

console.log("airports loaded:",airports.length)

})

/* SEARCH AIRPORT */

function searchAirports(query){

query=query.toLowerCase()

return airports
.filter(a=>

a.name &&
(
a.name.toLowerCase().includes(query) ||
a.city?.toLowerCase().includes(query) ||
a.country?.toLowerCase().includes(query) ||
a.iata?.toLowerCase().includes(query)
)

)
.slice(0,10)

}

/* AUTOCOMPLETE */

function setupAutocomplete(inputId,resultsId){

const input=document.getElementById(inputId)
const resultsBox=document.getElementById(resultsId)

input.addEventListener("input",()=>{

const results=searchAirports(input.value)

resultsBox.innerHTML=""

results.forEach(a=>{

const div=document.createElement("div")

div.innerText=`${a.city} - ${a.name} (${a.iata})`

div.onclick=()=>{

input.value=`${a.city} (${a.iata})`

resultsBox.innerHTML=""

}

resultsBox.appendChild(div)

})

})

}

setupAutocomplete("from","fromResults")
setupAutocomplete("to","toResults")

/* SWAP */

function swapAirports(){

let from=document.getElementById("from")
let to=document.getElementById("to")

let temp=from.value
from.value=to.value
to.value=temp

}

/* TRIP TYPE */

const roundBtn=document.getElementById("roundBtn")
const onewayBtn=document.getElementById("onewayBtn")
const returnDate=document.getElementById("returnDate")

roundBtn.onclick=()=>{

roundBtn.classList.add("trip-active")
onewayBtn.classList.remove("trip-active")

returnDate.style.display="block"

}

onewayBtn.onclick=()=>{

onewayBtn.classList.add("trip-active")
roundBtn.classList.remove("trip-active")

returnDate.style.display="none"

}

</script>

</body>

</html>
