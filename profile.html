<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>NomadFly Profile</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, deleteDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAyAu8ofSXIgx4LAIGFVnMJL9-xnQIzpa4",
authDomain: "nomadfly.firebaseapp.com",
projectId: "nomadfly",
storageBucket: "nomadfly.firebasestorage.app",
messagingSenderId: "139421378249",
appId: "1:139421378249:web:813b81d31b879a2e4a4f18",
measurementId: "G-R1XD9Q665C"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUID = null;

onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location="index.html"
return
}

currentUID = user.uid;

const userRef = doc(db,"users",user.uid)
const userSnap = await getDoc(userRef)

const data = userSnap.data()

document.getElementById("email").innerText = data.email
document.getElementById("username").value = data.username

loadSavedFlights(user.uid)

})

window.saveUsername = async function(){

const user = auth.currentUser
const newName = document.getElementById("username").value

await setDoc(doc(db,"users",user.uid),{
username:newName
},{merge:true})

alert("Username updated")

}

window.logout = async function(){

await signOut(auth)
window.location="index.html"

}

window.goHome = function(){
window.location="index.html"
}

window.goSavedFlights = function(){

window.location="saved.html"

}
window.viewFlight = function(from,to){

window.location =
`results.html?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`

}

window.removeFlight = async function(id){

await deleteDoc(doc(db,"users",currentUID,"savedFlights",id))

loadSavedFlights(currentUID)

}

async function loadSavedFlights(uid){

const flightsRef = collection(db,"users",uid,"savedFlights")
const flightsSnap = await getDocs(flightsRef)

const list = document.getElementById("savedFlights")

list.innerHTML=""

flightsSnap.forEach(docSnap=>{

const flight = docSnap.data()
const id = docSnap.id

const div = document.createElement("div")

div.className="flightCard"

div.innerHTML = `
<div>
<div class="flightRoute">${flight.from} → ${flight.to}</div>
<div class="flightPrice">💰 ${flight.price}</div>
</div>

<div class="flightButtons">
<button class="viewBtn" onclick="viewFlight('${flight.from}','${flight.to}')">View</button>
<button class="removeBtn" onclick="removeFlight('${id}')">Remove</button>
</div>
`

list.appendChild(div)

})

}

</script>

<style>

body{
font-family:Arial;
background:#0b1b36;
color:white;
margin:0;
display:flex;
justify-content:center;
padding-top:60px;
}

.container{
width:520px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.card{
background:#1c2a44;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input{
padding:10px;
border-radius:6px;
border:none;
margin-top:5px;
width:100%;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.saveBtn{
background:#38bdf8;
color:black;
margin-top:10px;
}

.logoutBtn{
background:#ef4444;
color:white;
width:100%;
margin-top:10px;
}

.homeBtn{
background:#38bdf8;
color:black;
width:100%;
margin-top:10px;
}

.flightCard{
background:#111c30;
padding:14px;
border-radius:8px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.flightRoute{
font-weight:bold;
}

.flightPrice{
opacity:0.8;
}

.flightButtons{
display:flex;
gap:6px;
}

.viewBtn{
background:#38bdf8;
color:black;
}

.removeBtn{
background:#ef4444;
color:white;
}

.savedFlightsBtn{
width:100%;
background:linear-gradient(135deg,#38bdf8,#0ea5e9);
color:black;
font-weight:bold;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
transition:0.2s;
font-size:15px;
}

.savedFlightsBtn:hover{
transform:scale(1.03);
background:linear-gradient(135deg,#0ea5e9,#0284c7);
}
</style>

</head>

<body>

<div class="container">

<h1>👤 Profile</h1>

<div class="card">

<h3>Account</h3>

Email:
<div id="email"></div>

<br>

Username:

<input id="username">

<button class="saveBtn" onclick="saveUsername()">Save username</button>

</div>

<button class="homeBtn" onclick="goHome()">⬅ Back to Home</button>
<button class="savedFlightsBtn" onclick="goSavedFlights()">
❤️ Saved Flights
</button>
<button class="logoutBtn" onclick="logout()">Logout</button>

</div>

</body>
</html>
